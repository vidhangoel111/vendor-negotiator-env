<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vendor Negotiation Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/ui/style.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <div class="bg-grid"></div>

    <main class="app-shell">
      <header class="hero card">
        <div>
          <p class="eyebrow">Autonomous Procurement Sandbox</p>
          <h1>Vendor Negotiation Studio</h1>
          <p class="subhead">
            Interactive browser UI for the same RL-style negotiation logic from your Python environment.
          </p>
        </div>
        <div class="hero-stats">
          <div class="stat">
            <span>Task</span>
            <strong id="taskBadge">easy</strong>
          </div>
          <div class="stat">
            <span>Step</span>
            <strong id="stepBadge">0 / 24</strong>
          </div>
          <div class="stat">
            <span>Final Score</span>
            <strong id="scoreBadge">0.000</strong>
          </div>
        </div>
      </header>

      <section class="control-strip card">
        <div class="control-group">
          <label for="taskSelect">Difficulty</label>
          <select id="taskSelect">
            <option value="easy">easy</option>
            <option value="medium">medium</option>
            <option value="hard">hard</option>
          </select>
        </div>

        <div class="control-group">
          <label for="vendorSelect">Vendor</label>
          <select id="vendorSelect"></select>
        </div>

        <div class="control-group">
          <label for="offerInput">Offer (Rs/kg)</label>
          <input id="offerInput" type="number" step="0.01" placeholder="180.00" />
        </div>

        <div class="button-row">
          <button id="resetBtn" class="btn btn-ghost">New Episode</button>
          <button id="autoStepBtn" class="btn btn-secondary">Heuristic Step</button>
          <button id="autoRunBtn" class="btn btn-secondary">Auto to End</button>
        </div>

        <div class="button-row">
          <button id="negotiateBtn" class="btn btn-primary">Negotiate</button>
          <button id="acceptBtn" class="btn btn-primary">Accept</button>
          <button id="skipBtn" class="btn btn-primary">Skip</button>
          <button id="finalizeBtn" class="btn btn-danger">Finalize</button>
        </div>
      </section>

      <section class="dashboard">
        <article class="panel card">
          <h2>Episode Snapshot</h2>
          <dl class="facts" id="facts"></dl>
        </article>

        <article class="panel card">
          <h2>Ranked Deals</h2>
          <div id="dealsList" class="deals-list"></div>
        </article>

        <article class="panel card panel-log">
          <h2>Step Log</h2>
          <div id="logList" class="log-list"></div>
        </article>
      </section>

      <section class="card vendors-wrap">
        <h2>Vendors</h2>
        <div id="vendorsGrid" class="vendors-grid"></div>
      </section>
    </main>

    <script src="/ui/app.js" defer></script>
  </body>
</html>
